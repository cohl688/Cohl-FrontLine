<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中海現樓 綜合管理系統</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="現樓管理">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/China_Overseas_Land_and_Investment_logo.svg/1024px-China_Overseas_Land_and_Investment_logo.svg.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 12px; }
        .container { max-width: 100%; margin: 0 auto; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-top: 6px solid #333; }
        h2 { text-align: center; color: #333; font-size: 1.1rem; margin-top: 0; margin-bottom: 15px; }
        
        .section { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #333; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.95rem; }
        input[type="file"], input[type="date"], input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        
        /* 四分頁選單樣式 */
        .tabs { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 15px; border-radius: 5px 5px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px 5px; background: #eef2f5; border: none; cursor: pointer; font-weight: bold; color: #555; font-size: 12px; transition: 0.3s; border-right: 1px solid #ddd; }
        .tab-btn:last-child { border-right: none; }
        .tab-btn.active[data-target="vvTab"] { background: #0056b3; color: white; }
        .tab-btn.active[data-target="tvTab"] { background: #d4af37; color: white; }
        .tab-btn.active[data-target="hrTab"] { background: #28a745; color: white; }
        .tab-btn.active[data-target="marketTab"] { background: #8e44ad; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        .flex-row > div { flex: 1; }
        .flex-row span { font-size: 0.85em; color: #555; display: block; margin-bottom: 4px; font-weight: bold; }

        .unit-row { display: flex; align-items: center; background: #fff; padding: 8px; border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 8px; }
        .drag-handle { cursor: grab; font-size: 20px; color: #adb5bd; padding: 0 10px 0 5px; user-select: none; }
        .unit-row input[type="text"] { margin-right: 5px; border: 1px solid #e9ecef; }
        
        .btn-del { background: #d9534f; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; }
        .btn-add { background: #e9ecef; color: #495057; border: 1px dashed #ced4da; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; margin-bottom: 15px; }
        
        button.action-btn { color: white; border: none; padding: 15px; font-size: 16px; border-radius: 5px; width: 100%; margin-bottom: 15px; font-weight: bold; }
        button.vv-btn { background-color: #0056b3; }
        button.tv-btn { background-color: #d4af37; }
        button.hr-btn { background-color: #28a745; }
        button.market-btn { background-color: #8e44ad; }
        
        .result-area { height: 250px; background-color: #eef2f5; font-size: 14px; }
        .save-badge { float: right; font-size: 0.8em; color: #28a745; display: none; }
        #logoPreview { max-width: 150px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏢 中海現樓 綜合管理系統</h2>

    <div class="tabs">
        <button class="tab-btn active" data-target="vvTab" onclick="switchTab('vvTab', this)">🏢 灣畔</button>
        <button class="tab-btn" data-target="tvTab" onclick="switchTab('tvTab', this)">💎 雙鑽</button>
        <button class="tab-btn" data-target="hrTab" onclick="switchTab('hrTab', this)">📄 HR</button>
        <button class="tab-btn" data-target="marketTab" onclick="switchTab('marketTab', this)">📊 成交</button>
    </div>

    <div id="globalUpload" class="section" style="border-left-color: #333; background: #f0f0f0;">
        <label>📂 上載 Excel 更表 (.xlsx) [灣畔/雙鑽/HR共用]</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <div id="uploadStatus" style="color:#d9534f; font-size:0.85em; margin-top:5px; font-weight:bold;">⚠️ 未上載更表</div>
    </div>

    <div id="vvTab" class="tab-content active">
        <div class="section" style="border-left-color: #0056b3;">
            <label>📅 日期與人數設定:</label>
            <input type="date" id="vvDutyDate" onchange="generateMessage('vv')">
            <div class="flex-row">
                <div><span>平日大使:</span><input type="number" id="vvWeekdayAmb" value="15" oninput="handleInput('vv')"></div>
                <div><span>假日大使:</span><input type="number" id="vvHolidayAmb" value="16" oninput="handleInput('vv')"></div>
            </div>
            <label style="margin-top: 12px; font-weight: normal; color:#d9534f; font-size: 0.9em; display: flex; align-items: center;">
                <input type="checkbox" id="vvIsHoliday" onchange="generateMessage('vv')" style="width: auto; margin-right: 8px;"> 
                強制使用假日人數
            </label>
        </div>

        <div class="section" style="border-left-color: #0056b3;">
            <label>🏠 示範單位設定 <span id="vvSaveBadge" class="save-badge">✅ 已儲存</span></label>
            <div id="vvFlatsContainer"></div>
            <button class="btn-add" onclick="addFlat('vv')">+ 新增戶型</button>
            <textarea id="vv_remarks" oninput="handleInput('vv')" style="height: 60px;" placeholder="備註..."></textarea>
        </div>
        <textarea id="vvResultMessage" class="result-area" readonly placeholder="請先上載 Excel..."></textarea>
        <button class="action-btn vv-btn" onclick="copyToClipboard('vvResultMessage')">📋 複製 (Copy to WhatsApp)</button>
    </div>

    <div id="tvTab" class="tab-content">
        <div class="section" style="border-left-color: #d4af37; background: #fdfbf7;">
            <label>📅 日期與人數設定:</label>
            <input type="date" id="tvDutyDate" onchange="generateMessage('tv')">
            <div class="flex-row">
                <div><span>平日大使:</span><input type="number" id="tvWeekdayAmb" value="3" oninput="handleInput('tv')"></div>
                <div><span>假日大使:</span><input type="number" id="tvHolidayAmb" value="4" oninput="handleInput('tv')"></div>
            </div>
            <label style="margin-top: 12px; font-weight: normal; color:#d9534f; font-size: 0.9em; display: flex; align-items: center;">
                <input type="checkbox" id="tvIsHoliday" onchange="generateMessage('tv')" style="width: auto; margin-right: 8px;"> 
                強制使用假日人數
            </label>
        </div>

        <div class="section" style="border-left-color: #d4af37; background: #fdfbf7;">
            <label style="color: #8b6508;">🏠 示範單位設定 <span id="tvSaveBadge" class="save-badge">✅ 已儲存</span></label>
            <div id="tvFlatsContainer"></div>
            <button class="btn-add" onclick="addFlat('tv')">+ 新增戶型</button>
            <textarea id="tv_remarks" oninput="handleInput('tv')" style="height: 60px;" placeholder="備註..."></textarea>
        </div>
        <textarea id="tvResultMessage" class="result-area" readonly placeholder="請先上載 Excel..."></textarea>
        <button class="action-btn tv-btn" onclick="copyToClipboard('tvResultMessage')">📋 複製 (Copy to WhatsApp)</button>
    </div>

    <div id="hrTab" class="tab-content">
        <div class="section" style="border-left-color: #28a745;">
            <label>🖼️ 設定公司 Logo (只需上載一次):</label>
            <input type="file" id="logoUpload" accept="image/png, image/jpeg">
            <img id="logoPreview" alt="Logo預覽">
            <span style="font-size: 0.8em; color: #28a745; margin-top: 5px; display: block;">✓ 成功上載後，Word檔將自動嵌入此Logo</span>
        </div>

        <div class="section" style="border-left-color: #28a745;">
            <label>👤 選擇員工 (由 Excel 自動讀取):</label>
            <select id="hrEmployeeSelect" onchange="loadEmployeeData()">
                <option value="">-- 請先上載 Excel --</option>
            </select>
            
            <div class="flex-row">
                <div><span>職位:</span><input type="text" id="hrPosition" oninput="saveEmployeeData()" placeholder="如: 高級銷售主任"></div>
                <div><span>員工編號:</span><input type="text" id="hrEmpId" oninput="saveEmployeeData()" placeholder="如: 50053152"></div>
            </div>
        </div>
        <button class="action-btn hr-btn" onclick="exportToWord()">📥 匯出 Word 出勤記錄表 (.doc)</button>
    </div>

    <div id="marketTab" class="tab-content">
        <div class="section" style="border-left-color: #8e44ad; background: #faf5fd;">
            <label>📝 貼上代理提供的 WhatsApp 原始成交：</label>
            <textarea id="rawTransactions" style="height: 150px; background: #fff;" placeholder="請在此貼上完整訊息..."></textarea>
            <button class="action-btn market-btn" style="margin-top:10px; margin-bottom:0;" onclick="filterTransactions()">🔍 立即過濾跑道區成交</button>
        </div>
        
        <div class="section" style="border-left-color: #8e44ad;">
            <label>✅ 過濾結果 (已重組及計算總數)：</label>
            <textarea id="filteredTransactions" class="result-area" readonly placeholder="過濾後的結果會在此顯示..."></textarea>
        </div>
        <button class="action-btn market-btn" onclick="copyToClipboard('filteredTransactions')">📋 複製結果</button>
    </div>
</div>

<script>
    // --- 全局變數 ---
    let rosterData = []; 
    let rosterYear = "";
    let rosterMonth = "";
    let daysInMonth = 31;
    let employeeList = []; 
    let savedLogoBase64 = "";

    // --- 地點與假期字典 (精準分離版) ---
    const WORK_LOCATIONS = {
        'C': { time: '09:00–17:30', desc: '公司(PP3)' },
        'OV': { time: '10:30–19:00', desc: '維港1號(現樓)' },
        'K': { time: '10:30–19:00', desc: '九龍灣國際交易中心' },
        'F': { time: '10:30–19:00', desc: '飛鵝山道3號(現樓)' },
        'TV': { time: '10:30–19:00', desc: '維港．雙鑽(現樓)' },
        'VV': { time: '10:30–19:00', desc: '維港‧灣畔(現樓)' },
        'VW': { time: '10:30–19:00', desc: '維港‧灣畔(現樓)' }
    };

    const EXACT_LEAVE_TYPES = {
        'FL': '喪假', 'Q': '居家隔離', 'ML': '產假', 'PL': '侍產假',
        'M': '婚假', 'BL': '生日假', 'CL': '關懷假', 'VL': '義工補假',
        'V': '疫苗假', 'WFH': '在家工作', 'JSL': '陪審員假', 'EL': '額外假期',
        'SL': '進修假', 'NPL': '無薪假', '/': '半天假'
    };

    const SYMBOL_LEAVE_TYPES = {
        '▲': '例假', '✽': '補假', '●': '超時工作補假', '★': '病假', 
        '■': '年假', '◎': '事假'
    };

    function parseShiftToHR(shiftValue) {
        let val = (shiftValue || "").toString().trim().toUpperCase();
        if (!val) return { time: '--', desc: '--', hours: '--' };

        if (EXACT_LEAVE_TYPES[val]) return { time: EXACT_LEAVE_TYPES[val], desc: EXACT_LEAVE_TYPES[val] + '一天', hours: '--' };

        for (const [symbol, leaveName] of Object.entries(SYMBOL_LEAVE_TYPES)) {
            if (val.includes(symbol)) return { time: leaveName, desc: leaveName + '一天', hours: '--' };
        }

        let locations = []; let timeRange = ''; let foundWork = false;
        val.split('/').forEach(p => {
            const trimmed = p.trim();
            if (WORK_LOCATIONS[trimmed]) {
                foundWork = true;
                locations.push(WORK_LOCATIONS[trimmed].desc);
                if (timeRange === '') timeRange = WORK_LOCATIONS[trimmed].time;
            }
        });

        if (foundWork) return { time: timeRange, desc: locations.join(' / '), hours: 8.5 };
        return { time: '--', desc: val, hours: '--' };
    }

    // --- 雙盤設定變數 ---
    const salesPool = ["Moon", "Joe", "Andrew", "Ankie", "Eric", "Stephen", "Peter"];
    const internPool = ["Sammi", "Karina", "Renne"];
    const defaultRemarks = "#為已裝飾無改動示範單位\n*為已裝飾有改動示範單位\n\n示位單位狀況大致良好，均達開放標準。";
    
    const defaultVVFlats = [
        { label: "1房", value: "T1A-17C" }, { label: "2房（開廚）", value: "T1A-17D, T1A-17E, T1B-17B" },
        { label: "2房（梗廚）", value: "T1C-17G" }, { label: "2房+儲物房（梗廚）", value: "T1B-17A, T2A-17A, T2B-17J, T2A-17J" },
        { label: "3房1套（開廚）", value: "T5B-17B" }, { label: "3房1套+工作間連洗手間", value: "*T1A-17A, T1A-17B, T5B-17A" }
    ];
    
    const defaultTVFlats = [
        { label: "開放式", value: "T2A-21C" }, { label: "2房開廚", value: "T1A-21F, T2A-21A, T2B-21D" },
        { label: "2房梗廚", value: "T1B-21H, T2A-21G, T2B-21E" }, { label: "3房1套(儲)", value: "#T2B-21G" },
        { label: "3房1套(連工人套)", value: "*T2B-21F" }
    ];

    let vvFlats = [], tvFlats = [];

    window.onload = function() {
        document.getElementById('vvDutyDate').valueAsDate = new Date();
        document.getElementById('tvDutyDate').valueAsDate = new Date();
        loadSettings();
    };

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        
        // 如果切換到跑道成交，隱藏 Excel 上載區，否則顯示
        document.getElementById('globalUpload').style.display = (tabId === 'marketTab') ? 'none' : 'block';
    }

    // --- 系統設定與 Logo 讀取 ---
    function loadSettings() {
        // 載入 Logo
        savedLogoBase64 = localStorage.getItem('hr_logo_base64');
        if(savedLogoBase64) {
            document.getElementById('logoPreview').src = savedLogoBase64;
            document.getElementById('logoPreview').style.display = 'block';
        }

        // 載入 VV
        document.getElementById('vvWeekdayAmb').value = localStorage.getItem('vv_wk_amb_v8') || "15";
        document.getElementById('vvHolidayAmb').value = localStorage.getItem('vv_hol_amb_v8') || "16";
        vvFlats = JSON.parse(localStorage.getItem('vv_flats_v8')) || JSON.parse(JSON.stringify(defaultVVFlats));
        document.getElementById('vv_remarks').value = localStorage.getItem('vv_remarks_v8') || defaultRemarks;
        
        // 載入 TV
        document.getElementById('tvWeekdayAmb').value = localStorage.getItem('tv_wk_amb_v8') || "3";
        document.getElementById('tvHolidayAmb').value = localStorage.getItem('tv_hol_amb_v8') || "4";
        tvFlats = JSON.parse(localStorage.getItem('tv_flats_v8')) || JSON.parse(JSON.stringify(defaultTVFlats));
        document.getElementById('tv_remarks').value = localStorage.getItem('tv_remarks_v8') || defaultRemarks;

        renderFlats('vv'); renderFlats('tv');
    }

    // Logo 轉換與儲存
    document.getElementById('logoUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                savedLogoBase64 = evt.target.result;
                localStorage.setItem('hr_logo_base64', savedLogoBase64);
                document.getElementById('logoPreview').src = savedLogoBase64;
                document.getElementById('logoPreview').style.display = 'block';
                alert("✅ Logo 已成功儲存！");
            };
            reader.readAsDataURL(file);
        }
    });

    function renderFlats(type) {
        const container = document.getElementById(`${type}FlatsContainer`);
        const flatsArr = type === 'vv' ? vvFlats : tvFlats;
        container.innerHTML = '';
        flatsArr.forEach((flat, index) => {
            container.innerHTML += `
                <div class="unit-row" data-id="${index}">
                    <div class="drag-handle">☰</div>
                    <input type="text" placeholder="戶型" value="${flat.label}" oninput="updateFlat('${type}', ${index}, 'label', this.value)" style="flex:1;">
                    <input type="text" placeholder="號碼" value="${flat.value}" oninput="updateFlat('${type}', ${index}, 'value', this.value)" style="flex:1.5;">
                    <button class="btn-del" onclick="deleteFlat('${type}', ${index})">刪</button>
                </div>
            `;
        });
        initSortable(type); generateMessage(type);
    }

    function initSortable(type) {
        new Sortable(document.getElementById(`${type}FlatsContainer`), {
            handle: '.drag-handle', animation: 150,
            onEnd: function (evt) {
                const arr = type === 'vv' ? vvFlats : tvFlats;
                const item = arr.splice(evt.oldIndex, 1)[0];
                arr.splice(evt.newIndex, 0, item);
                saveSettings(type); renderFlats(type); 
            }
        });
    }

    function addFlat(type) {
        if (type === 'vv') vvFlats.push({ label: "", value: "" });
        if (type === 'tv') tvFlats.push({ label: "", value: "" });
        renderFlats(type); saveSettings(type);
    }

    function updateFlat(type, index, field, value) {
        if (type === 'vv') vvFlats[index][field] = value;
        if (type === 'tv') tvFlats[index][field] = value;
        handleInput(type);
    }

    function deleteFlat(type, index) {
        if (type === 'vv') vvFlats.splice(index, 1);
        if (type === 'tv') tvFlats.splice(index, 1);
        renderFlats(type); saveSettings(type);
    }

    function handleInput(type) { generateMessage(type); saveSettings(type); }

    function saveSettings(type) {
        if (type === 'vv') {
            localStorage.setItem('vv_flats_v8', JSON.stringify(vvFlats));
            localStorage.setItem('vv_remarks_v8', document.getElementById('vv_remarks').value);
            localStorage.setItem('vv_wk_amb_v8', document.getElementById('vvWeekdayAmb').value);
            localStorage.setItem('vv_hol_amb_v8', document.getElementById('vvHolidayAmb').value);
        } else {
            localStorage.setItem('tv_flats_v8', JSON.stringify(tvFlats));
            localStorage.setItem('tv_remarks_v8', document.getElementById('tv_remarks').value);
            localStorage.setItem('tv_wk_amb_v8', document.getElementById('tvWeekdayAmb').value);
            localStorage.setItem('tv_hol_amb_v8', document.getElementById('tvHolidayAmb').value);
        }
        const badge = document.getElementById(`${type}SaveBadge`);
        badge.style.display = 'inline'; setTimeout(() => { badge.style.display = 'none'; }, 2000);
    }

    // --- Excel 檔案讀取 ---
    document.getElementById('excelFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                rosterData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                document.getElementById('uploadStatus').innerText = `✅ Excel 讀取成功`;
                document.getElementById('uploadStatus').style.color = "#28a745";
                
                if (rosterData[1] && rosterData[1][0]) {
                    const match = rosterData[1][0].match(/(\d{4})年(\d{1,2})月份/);
                    if (match) { rosterYear = match[1]; rosterMonth = match[2]; daysInMonth = new Date(rosterYear, rosterMonth, 0).getDate(); }
                }
                populateEmployeeDropdown();
                generateMessage('vv'); generateMessage('tv'); 
            } catch (error) { document.getElementById('uploadStatus').innerText = "❌ 格式錯誤"; }
        };
        reader.readAsArrayBuffer(file);
    });

    // --- Message 產生器 ---
    function generateMessage(type) {
        const isVV = type === 'vv';
        const dateInput = document.getElementById(`${type}DutyDate`).value;
        if (!dateInput) return;
        
        const d = new Date(dateInput);
        const weekdayNum = d.getDay(); 
        const formattedDate = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} (${["日","一","二","三","四","五","六"][weekdayNum]})`;

        const customWkAmb = document.getElementById(`${type}WeekdayAmb`).value || (isVV ? "15" : "3");
        const customHolAmb = document.getElementById(`${type}HolidayAmb`).value || (isVV ? "16" : "4");
        let ambassadorCount = (weekdayNum === 0 || weekdayNum === 6 || document.getElementById(`${type}IsHoliday`).checked) ? customHolAmb : customWkAmb;

        let salesToday = [], internToday = [];

        if (rosterData.length > 0) {
            const targetCol = d.getDate() + 2; 
            for (let i = 4; i < rosterData.length; i++) {
                let row = rosterData[i];
                if (!row || !row[0]) continue; 
                let cellName = String(row[0]), shiftValue = String(row[targetCol] || "").trim().toUpperCase();
                
                if (isVV && (shiftValue.includes('VV') || shiftValue.includes('VW'))) {
                    salesPool.forEach(n => { if (cellName.includes(n) && !salesToday.includes(n)) salesToday.push(n); });
                    internPool.forEach(n => { if (cellName.includes(n) && !internToday.includes(n)) internToday.push(n); });
                } else if (!isVV && shiftValue.includes('TV')) {
                    salesPool.forEach(n => { if (cellName.includes(n) && !salesToday.includes(n)) salesToday.push(n); });
                }
            }
        }

        let showflatText = "";
        const flatsArr = isVV ? vvFlats : tvFlats;
        flatsArr.forEach(flat => {
            if (flat.label.trim() && flat.value.trim()) showflatText += `${flat.label}：${flat.value}\n`;
        });
        showflatText += `\n${document.getElementById(`${type}_remarks`).value.trim()}`;

        const projName = isVV ? "維港‧灣畔現樓" : "維港‧雙鑽現樓";
        const cleanerCount = isVV ? 3 : 1;
        
        let msg = `${projName}\n${formattedDate}\n\n⏰當值時間：10:30pm-7:00pm\n\n👤當值人員\n`;
        msg += `銷售 ：${salesToday.length ? salesToday.join(', ') + ' (' + salesToday.length + '人)' : '無 (0人)'}\n`;
        if (isVV) msg += `實習生：${internToday.length ? internToday.join(', ') + ' (' + internToday.length + '人)' : '無 (0人)'}\n`;
        msg += `服務大使：${ambassadorCount}人\n清潔：${cleanerCount}人\n\n「開放示範單位」：\n${showflatText}`;

        document.getElementById(`${type}ResultMessage`).value = msg;
    }

    function copyToClipboard(elementId) {
        const t = document.getElementById(elementId);
        if(!t.value || t.value.includes("請先上載")) { alert("未能複製空內容"); return; }
        t.select(); t.setSelectionRange(0, 99999); 
        navigator.clipboard.writeText(t.value).then(() => alert("✅ 已複製")).catch(() => alert("請手動複製"));
    }

    // --- HR 出勤表模組 ---
    function populateEmployeeDropdown() {
        employeeList = [];
        const select = document.getElementById('hrEmployeeSelect');
        select.innerHTML = '<option value="">-- 請選擇員工 --</option>';
        for (let i = 4; i < rosterData.length; i++) {
            let row = rosterData[i];
            if (row && row[0] && typeof row[0] === 'string' && row[1] && typeof row[1] === 'string' && row[1].includes('(')) {
                let name = row[0].trim();
                employeeList.push({ name: name, rowIndex: i });
                select.innerHTML += `<option value="${i}">${name}</option>`;
            }
        }
    }

    function loadEmployeeData() {
        const select = document.getElementById('hrEmployeeSelect');
        if (!select.value) return;
        const name = select.options[select.selectedIndex].text;
        const saved = localStorage.getItem('hr_data_' + name);
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('hrPosition').value = data.position || '';
            document.getElementById('hrEmpId').value = data.empId || '';
        } else {
            document.getElementById('hrPosition').value = '';
            document.getElementById('hrEmpId').value = '';
        }
    }

    function saveEmployeeData() {
        const select = document.getElementById('hrEmployeeSelect');
        if (!select.value) return;
        const name = select.options[select.selectedIndex].text;
        localStorage.setItem('hr_data_' + name, JSON.stringify({ 
            position: document.getElementById('hrPosition').value.trim(), 
            empId: document.getElementById('hrEmpId').value.trim() 
        }));
    }

    function exportToWord() {
        const select = document.getElementById('hrEmployeeSelect');
        if (!select.value) { alert("請先上載更表並選擇員工！"); return; }
        
        const rowIndex = parseInt(select.value);
        const empName = select.options[select.selectedIndex].text;
        const position = document.getElementById('hrPosition').value.trim();
        const empId = document.getElementById('hrEmpId').value.trim();
        
        if (!rosterYear || !rosterMonth) { alert("無法從 Excel 讀取年月，請確保格式正確。"); return; }
        
        const rowData = rosterData[rowIndex];
        let totalHours = 0;
        
        // 將儲存的 Base64 嵌入 HTML，保證離線可用
        let imgHtml = savedLogoBase64 
            ? `<img src="${savedLogoBase64}" style="width: 250px; height: auto;" />` 
            : `<h3 style="color:#0056b3;">[請先於系統上載公司 Logo]</h3>`;

        let htmlContent = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
            <meta charset='utf-8'>
            <style>
                body { font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif; font-size: 12pt; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
                th, td { border: 1px solid black; padding: 6px; text-align: center; }
                .meta-table td { border: none; text-align: left; padding: 2px; }
                h2 { text-align: center; font-size: 16pt; margin-bottom: 20px; }
                .logo-container { text-align: left; margin-bottom: 15px; }
            </style>
        </head>
        <body>
            <div class="logo-container">
                ${imgHtml}
            </div>
            <h2>手寫出勤記錄表 ( ${rosterYear} )年(${rosterMonth})月份</h2>
            <table class="meta-table">
                <tr>
                    <td style="width: 25%;">姓名：${empName}</td>
                    <td style="width: 25%;">職位：${position}</td>
                    <td style="width: 25%;">部門/地盤：營業部</td>
                    <td style="width: 25%;">員工編號：${empId}</td>
                </tr>
            </table>
            <table>
                <tr>
                    <th style="width: 10%;">日</th>
                    <th style="width: 30%;">工作起止時間</th>
                    <th style="width: 45%;">工作內容</th>
                    <th style="width: 15%;">共計</th>
                </tr>`;

        for (let day = 1; day <= daysInMonth; day++) {
            const shiftVal = rowData[day + 2];
            const parsed = parseShiftToHR(shiftVal);
            htmlContent += `
                <tr>
                    <td>${day}</td>
                    <td>${parsed.time}</td>
                    <td>${parsed.desc}</td>
                    <td>${parsed.hours === '--' ? '--' : parsed.hours + '小時'}</td>
                </tr>`;
            if (typeof parsed.hours === 'number') totalHours += parsed.hours;
        }

        htmlContent += `
            </table>
            <p style="text-align: right; margin-top: 10px; font-weight: bold;">總計時數：${totalHours} 小時</p>
        </body>
        </html>`;

        const monthsEng = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const monthWord = monthsEng[parseInt(rosterMonth) - 1] || rosterMonth;
        const safeName = empName.replace(/ /g, '_');
        const fileName = `${safeName}出勤記錄表${monthWord} ${rosterYear}.doc`;

        const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(htmlContent);
        const fileDownload = document.createElement("a");
        document.body.appendChild(fileDownload);
        fileDownload.href = source;
        fileDownload.download = fileName;
        fileDownload.click();
        document.body.removeChild(fileDownload);
    }

    // --- 跑道區成交過濾模組 ---
    function filterTransactions() {
        const rawText = document.getElementById('rawTransactions').value;
        if(!rawText.trim()) return;

        // 目標過濾關鍵字
        const keywords = [
            "天璽·海", "天璽‧海", "天璽·海(I)", "天璽·海2B", "天璽·海2A", 
            "柏蔚森", "澐璟", "Miami Quay", "維港·灣畔", "維港‧灣畔", 
            "維港·雙鑽", "維港‧雙鑽", "啟德海灣", "Double Coast", "天瀧", "維港1號", "維港一號"
        ];
        
        const separator = "🔸🔹🔸🔹🔸🔹";
        const blocks = rawText.split(separator);
        
        if(blocks.length < 2) {
            alert("未能偵測到分隔線(🔸🔹🔸🔹🔸🔹)，請確保貼上完整訊息。");
            return;
        }

        const header = blocks.shift(); 
        let dateStr = "今日";
        const dateMatch = header.match(/(.*?)一手市場成交/);
        if(dateMatch) {
            dateStr = dateMatch[1].trim();
        }

        let validBlocks = [];
        let totalCount = 0;

        blocks.forEach(block => {
            if(!block.trim()) return;
            
            const isRunway = keywords.some(kw => block.includes(kw));
            if(isRunway) {
                validBlocks.push(block.trim());
                // 尋找「：數字」或「:數字」來計算成交宗數
                const countMatch = block.match(/[:：]\s*(\d+)/);
                if(countMatch) {
                    totalCount += parseInt(countMatch[1], 10);
                }
            }
        });

        let finalText = `${dateStr}一手跑道區成交：(${totalCount})\n${separator}\n`;
        finalText += validBlocks.join(`\n${separator}\n`);
        if(validBlocks.length > 0) {
            finalText += `\n${separator}`;
        }

        document.getElementById('filteredTransactions').value = finalText;
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed: ', err)); });
    }
</script>
